{% extends "base.html" %}

{% block content %}
<div class= 'container mt-5 d-flex justify-content-center align-items-center'>
  <form action="{% url 'pj01:index'%}" method="post" >
    {%csrf_token%}
    <div class="form-group">
      <label for="username" name = 'username'>ID:</label>
      <input type="text", class="form-control" name = 'username'>
    </div>
    <div class="form-group">
      <label for="password" name = 'password'>Pwd:</label>
      <input type="password" class="form-control" name = 'password'>
    </div>
    <div class="my-3">
      <button type="submit" class="btn btn-primary">로그인</button>
      <a href="{%url 'pj01:signup'%}" class="btn btn-primary">회원가입</a>
    </div>
  </form>
</div>
{% endblock content %}
